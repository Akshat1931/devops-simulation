---
- name: Install Jenkins and Docker on Jenkins node
  hosts: jenkins
  become: true
  tasks:
    - name: Install Java and dependencies
      ansible.builtin.apt:
        name:
          - openjdk-17-jre
          - gnupg
        state: present

    - name: Add Jenkins apt key
      ansible.builtin.shell: |
        curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key | gpg --dearmor --yes --output /usr/share/keyrings/jenkins-keyring.gpg

    - name: Add Jenkins repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/jenkins.list
        content: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/\n"
        mode: "0644"

    - name: Install Jenkins
      ansible.builtin.apt:
        name: jenkins
        state: present
        update_cache: true

    - name: Install Docker
      ansible.builtin.apt:
        name: docker.io
        state: present

    - name: Ensure Jenkins service started
      ansible.builtin.service:
        name: jenkins
        state: started
        enabled: true

    - name: Ensure Docker service started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add jenkins user to docker group
      ansible.builtin.user:
        name: jenkins
        groups: docker
        append: true
