apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform-app
  labels:
    app: devops-platform-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-platform-app
  template:
    metadata:
      labels:
        app: devops-platform-app
    spec:
      containers:
        - name: devops-platform-app
          image: __IMAGE__
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20

